name: CI — Integration Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Lint & Package Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify package installs correctly
        run: |
          pip install -e .
          python -c "from cnnClassifier import logger; logger.info('Package import OK')"

      - name: Check source structure
        run: |
          python -c "
          from cnnClassifier.utils.common import (
              read_yaml, create_directories, save_json,
              load_json, save_bin, load_bin, get_size,
              decode_image, encode_image_into_base64
          )
          print('All utility functions imported successfully.')
          "
